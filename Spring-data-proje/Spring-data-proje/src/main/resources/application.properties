spring.application.name=Spring-data-proje
spring.datasource.url=jdbc:postgresql://localhost:5432/dernegi_db
spring.jpa.properties.hibernate.default_schema=dernek
spring.datasource.username=postgres
spring.datasource.password=medet
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
